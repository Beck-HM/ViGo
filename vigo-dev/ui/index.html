<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViGo Dev</title>
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="vs/editor/editor.main.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menubar">
        <div class="menu-item" onclick="toggleMenu('project-dropdown')">📁 Project
            <div class="menu-dropdown" id="project-dropdown">
                <div class="menu-dropdown-item" onclick="event.stopPropagation();showOpenProjectModal()">📂 Open Project...</div>
                <div class="menu-dropdown-item" onclick="event.stopPropagation();showCreateProjectModal()">➕ New Project...</div>
                <div class="menu-separator"></div>
                <div id="project-list-dropdown"></div>
                <div class="menu-separator"></div>
                <div class="menu-dropdown-item" onclick="event.stopPropagation();closeProject()">✖ Close Project</div>
            </div>
        </div>
        <div class="menu-right">
            <button onclick="showTaskManager()">📋 Task</button>
            <button id="agent-btn" onclick="toggleAgentMonitor()" style="color:#484f58;" disabled>🟢 Agent</button>
            <button onclick="saveCurrentFile()">💾 Save</button>
            <button onclick="runCurrentFile()">▶️ Run</button>
            <button onclick="runTests()">🧪 Test</button>
            <button onclick="showMemory()">🧠 Memory</button>
            <button onclick="showSettings()">⚙️</button>
        </div>
    </div>
    <div id="toolbar">
        <span class="logo">⚡ ViGo Dev</span>
        <span id="project-name" class="">No project open</span>
        <span style="margin-left:auto;"></span>
        <button onclick="showModels()" style="background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;padding:2px 10px;font-size:11px;cursor:pointer;">🤖 Models</button>
    </div>
    <div id="main-container">
        <div id="sidebar">
            <div class="panel-header">
                <span>📁 Files</span>
                <span style="margin-left:auto;display:flex;gap:4px;">
                    <span onclick="showGitPanel()" style="cursor:pointer;font-size:14px;" title="Git">🔀</span>
                    <span onclick="loadFileTree()" style="cursor:pointer;font-size:14px;" title="Refresh">🔄</span>
                </span>
            </div>
            <div id="file-tree"><div class="tree-item" style="color:#8b949e">Open a project to browse files</div></div>
        </div>
        <div class="resizer-h" id="resizer-sidebar"></div>
        <div id="editor-container">
            <div id="editor-tabs"><span id="tab-label" class="tab active">Welcome</span></div>
            <div id="editor"></div>
            <div class="resizer-v" id="resizer-terminal"></div>
            <div id="terminal" style="display:none">
                <div id="terminal-header"><span>💻 Terminal</span><span onclick="toggleTerminal()" style="cursor:pointer;color:#8b949e">✖</span></div>
                <div id="terminal-output"></div>
            </div>
        </div>
        <div class="resizer-h" id="resizer-chat"></div>
        <div id="chat-panel">
            <div class="panel-header" style="display:flex;justify-content:space-between;align-items:center;">
                <span>💬 AI Assistant</span>
                <div style="display:flex;align-items:center;gap:4px;">
                    <span id="chat-model-btn" onclick="showModelPicker()" style="font-size:11px;color:#8b949e;cursor:pointer;padding:2px 6px;border-radius:4px;">🤖 ▾</span>
                    <span onclick="newChat()" style="font-size:14px;color:#8b949e;cursor:pointer;padding:2px 6px;border-radius:4px;font-weight:bold;" title="New Chat">+</span>
                </div>
            </div>
            <div id="chat-tabs"></div>
            <div id="task-progress" style="display:none;"></div>
            <div id="chat-messages"></div>
            <div id="delegate-bar">
                <button class="btn-cancel" onclick="cancelDelegate()">Cancel</button>
                <button class="btn-create" onclick="confirmDelegate()">🤝 Create Worker</button>
            </div>
            <div id="chat-input-area">
                <textarea id="chat-input" placeholder="Ask about the code..." rows="2"></textarea>
                <button id="btn-send">Send</button>
            </div>
        </div>
    </div>
    <div id="status-bar">
        <span id="status-file">No file open</span>
        <span id="status-model">Model: gemma-4b</span>
    </div>
    <script src="vs/loader.js"></script>
    <script src="script.js"></script>
</body>
</html>
